name: cd
on:
  push:
    branches: [main]


jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GC_SA_KEY }}
      - name: Gcloud setup
        uses: google-github-actions/setup-gcloud@v3
      - name: Build image
        run: gcloud builds submit --tag europe-north1-docker.pkg.dev/wordsofwisdom-499017/wordsofwisdom/wordsofwisdom:latest .
      - name: Deploy
        run: gcloud run deploy wordsofwisdom --image-url europe-north1-docker.pkg.dev/wordsofwisdom-499017/wordsofwisdom/wordsofwisdom:latest --region europe-north1 --allow-unauthenticated --service-account=service-account@wordsofwisdom-499017.iam.gserviceaccount.com --port 8080



